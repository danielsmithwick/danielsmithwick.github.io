<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream House — Interactive Floor Plan</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #030712;
      --surface: #0f172a;
      --border:  #1e293b;
      --accent:  #38bdf8;
      --text:    #f1f5f9;
      --muted:   #64748b;
      --dim:     #94a3b8;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 54px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 1.4rem; gap: 1rem; z-index: 100;
    }
    .back-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.75rem; padding: 0.3rem 0.7rem;
      border-radius: 4px; cursor: pointer; text-decoration: none;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--accent); }
    .header-divider { width: 1px; height: 22px; background: var(--border); }
    .header-label {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent);
    }
    .header-title { font-size: 0.92rem; font-weight: 700; color: var(--text); }
    .header-stats {
      margin-left: auto; display: flex; gap: 1.4rem; align-items: center;
    }
    .stat { display: flex; flex-direction: column; align-items: flex-end; }
    .stat-val { font-size: 0.88rem; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }

    /* ── Layout ──────────────────────────────────────────────────────── */
    main {
      position: fixed; top: 54px; bottom: 0; left: 0; right: 0;
      display: flex;
    }
    .plan-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }

    /* ── SVG ─────────────────────────────────────────────────────────── */
    #plan-svg { width: 100%; height: 100%; }

    .room-group { cursor: pointer; }
    .room-poly {
      transition: filter 0.15s;
      stroke-linejoin: round;
    }
    .room-group:hover .room-poly { filter: brightness(1.35); }
    .room-group.selected .room-poly {
      stroke-width: 0.8 !important;
      filter: brightness(1.5) drop-shadow(0 0 3px var(--stroke-col));
    }

    /* ── Detail panel ────────────────────────────────────────────────── */
    .detail-panel {
      width: 0; overflow: hidden;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transition: width 0.28s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
      position: relative;
    }
    .detail-panel.open { width: 310px; }
    .detail-inner {
      width: 310px; height: 100%;
      overflow-y: auto; padding: 1.4rem 1.4rem 2rem;
    }
    .detail-close {
      position: absolute; top: 0.8rem; right: 0.9rem;
      background: none; border: none; color: var(--muted);
      font-size: 1.1rem; cursor: pointer; line-height: 1;
      transition: color 0.15s;
    }
    .detail-close:hover { color: var(--text); }
    .color-bar { height: 3px; border-radius: 2px; margin-bottom: 1.1rem; }
    .detail-tag {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 0.35rem;
    }
    .detail-name {
      font-size: 1.15rem; font-weight: 700; color: var(--text);
      line-height: 1.3; margin-bottom: 0.9rem;
    }
    .metrics {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.45rem; margin-bottom: 1rem;
    }
    .metric {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 0.55rem 0.7rem;
    }
    .metric-val { font-size: 0.92rem; font-weight: 700; color: var(--text); }
    .metric-lbl {
      font-size: 0.6rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em; margin-top: 1px;
    }
    .detail-desc {
      font-size: 0.82rem; color: var(--dim);
      line-height: 1.72; margin-bottom: 0.9rem;
    }
    .features-title {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem;
    }
    .features {
      list-style: none; font-size: 0.8rem;
      color: var(--dim); line-height: 1.9;
    }
    .features li::before { content: '→ '; color: var(--accent); }

    /* ── Overlay hints ───────────────────────────────────────────────── */
    .hint {
      position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.68rem; color: var(--muted); letter-spacing: 0.05em;
      pointer-events: none; transition: opacity 0.4s;
    }
    .hint.gone { opacity: 0; }

    /* ── Tooltip ─────────────────────────────────────────────────────── */
    #tip {
      position: fixed; pointer-events: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 5px; padding: 0.35rem 0.7rem;
      font-size: 0.76rem; color: var(--text);
      opacity: 0; transition: opacity 0.12s;
      z-index: 300; white-space: nowrap;
    }
    #tip.show { opacity: 1; }

    /* ── Compass ─────────────────────────────────────────────────────── */
    .compass-wrap {
      position: absolute; bottom: 1.2rem; left: 1.4rem;
      opacity: 0.55;
    }

    /* ── Legend ──────────────────────────────────────────────────────── */
    .legend {
      position: absolute; bottom: 1.2rem; right: 1.4rem;
      display: flex; flex-direction: column; gap: 0.28rem;
    }
    .leg-item {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.65rem; color: var(--muted);
    }
    .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <a href="/" class="back-btn">← Portfolio</a>
  <div class="header-divider"></div>
  <div>
    <div class="header-label">Interactive Floor Plan</div>
    <div class="header-title">Multigenerational Dream House</div>
  </div>
  <div class="header-stats">
    <div class="stat"><span class="stat-val">10</span><span class="stat-label">Bedrooms</span></div>
    <div class="stat"><span class="stat-val">~6,200</span><span class="stat-label">Sq Ft</span></div>
    <div class="stat"><span class="stat-val">5</span><span class="stat-label">Design Roles</span></div>
    <div class="stat"><span class="stat-val">Gehry</span><span class="stat-label">Inspired</span></div>
  </div>
</header>

<main>
  <div class="plan-wrap" id="plan-wrap">
    <svg id="plan-svg" viewBox="-62 -58 128 102" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-filter" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Site ground -->
      <rect x="-62" y="-58" width="128" height="102" fill="#060d1a"/>

      <g id="rooms-layer"></g>
      <g id="labels-layer"></g>

      <!-- Compass -->
      <g transform="translate(-54, 36)">
        <circle r="7" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        <text y="-8.5" text-anchor="middle" font-size="3.5" fill="#38bdf8" font-weight="700">N</text>
        <text y="11.5" text-anchor="middle" font-size="3" fill="#334155">S</text>
        <text x="9.5" y="1" text-anchor="middle" font-size="3" fill="#334155">E</text>
        <text x="-9.5" y="1" text-anchor="middle" font-size="3" fill="#334155">W</text>
        <polygon points="0,-6 1.3,0 0,-1.8 -1.3,0" fill="#38bdf8"/>
        <polygon points="0,6 1.3,0 0,1.8 -1.3,0" fill="#334155"/>
      </g>
    </svg>

    <div class="hint" id="hint">Click any room to explore</div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-inner">
      <button class="detail-close" id="detail-close">×</button>
      <div id="detail-content"></div>
    </div>
  </div>
</main>

<div id="tip"></div>

<script>
// ── Room data (coordinates in feet, same origin as Fusion script) ──────────
const ROOMS = [
  {
    id: 'yard', name: 'Back Yard & Garden', tag: 'Landscape',
    cx: 0, cy: 34, w: 70, d: 28, angle: 0, height: 0, sqft: 1960,
    fill: '#0b1f12', stroke: '#1a3a22',
    desc: 'Expansive rear lawn framed by low stone walls. Garden beds flank the lap pool on east and west; a hedge row closes the north boundary.',
    features: ['Lap pool at north', 'Garden beds E + W of pool', 'Low stone perimeter walls', '10 mature trees throughout site'],
    z: 0,
  },
  {
    id: 'pool', name: 'Lap Pool', tag: 'Outdoor',
    cx: 0, cy: 30, w: 32, d: 10, angle: 0, height: 0, sqft: 320,
    fill: '#082f49', stroke: '#0ea5e9',
    desc: '32 × 10 ft lap pool, sunken 1 ft below grade on the north side of the property. Water-blue finish.',
    features: ['32 ft length', 'Sunken 1 ft below grade', 'Water-blue finish', 'Garden beds on both sides'],
    z: 1,
  },
  {
    id: 'courtyard', name: 'Courtyard', tag: 'Outdoor',
    cx: 0, cy: 10, w: 24, d: 16, angle: 0, height: 0, sqft: 384,
    fill: '#111827', stroke: '#334155',
    desc: 'Sunken stone-paved courtyard between the two bedroom wings — an open-air room with 4 ft stone walls on three sides, open toward the main house.',
    features: ['Stone paving', '4 ft stone walls — 3 sides', 'Open toward main house', '2 courtyard trees'],
    z: 1,
  },
  {
    id: 'wingB', name: 'Bedroom Wing B', tag: 'Generation 2 · 5 Bedrooms',
    cx: -16, cy: 12, w: 26, d: 20, angle: -12, height: 22, sqft: 520,
    fill: '#0f1f38', stroke: '#3b82f6',
    desc: 'Five bedrooms for the second generation — angled NW at −12°. Brick-clad, 22 ft tall across two floors. Slightly lower than Wing A to reinforce generational hierarchy.',
    features: ['5 bedrooms (~104 sq ft each)', '2 floors', 'Recessed windows all sides', 'Brick exterior, −12° rotation'],
    z: 2,
  },
  {
    id: 'wingA', name: 'Bedroom Wing A', tag: 'Generation 1 · 5 Bedrooms',
    cx: 16, cy: 14, w: 30, d: 22, angle: 15, height: 28, sqft: 660,
    fill: '#0c1a35', stroke: '#60a5fa',
    desc: 'Five bedrooms for the first generation — dominant NE mass at +15°, brick-clad, 28 ft tall across three floors. The tallest wing.',
    features: ['5 bedrooms (~132 sq ft each)', '3 floors', 'Recessed windows all sides', '28 ft — tallest wing'],
    z: 2,
  },
  {
    id: 'kitchen', name: 'Kitchen', tag: 'Service',
    cx: 18, cy: 6, w: 16, d: 14, angle: 8, height: 11, sqft: 224,
    fill: '#031a0e', stroke: '#10b981',
    desc: 'One shared kitchen for the entire multigenerational family. Single-story volume in the NE quadrant, brick-clad, windows on all sides.',
    features: ['Single story (11 ft)', 'NE quadrant', 'Brick exterior', 'Windows on all four sides'],
    z: 3,
  },
  {
    id: 'clash', name: 'Gehry Clash Mass', tag: 'Communal Volume',
    cx: -4, cy: 3, w: 38, d: 18, angle: -11, height: 26, sqft: 684,
    fill: '#1a1512', stroke: '#a8a29e',
    desc: 'A secondary colliding volume punching through the main bar at −11°, concrete-clad. The intersection with the primary bar creates dramatic shadow reveals — a direct reference to MIT\'s Stata Center.',
    features: ['26 ft tall', 'Concrete exterior', 'Collides with main bar at −11°', 'Recessed glazing bands'],
    z: 3,
  },
  {
    id: 'main', name: 'Communal Living', tag: 'Communal · Heart of the House',
    cx: 0, cy: 0, w: 48, d: 22, angle: 6, height: 20, sqft: 1056,
    fill: '#1a1205', stroke: '#f59e0b',
    desc: 'Living room, dining room, and lounge — the heart of the multigenerational home. Two-story open volume, floor plate at 10 ft, tilted asymmetric roof slab at +9°.',
    features: ['2 floors (20 ft)', 'Living / dining / lounge zones', 'Floor plate at 10 ft', 'Tilted roof slab at +9°'],
    z: 4,
  },
  {
    id: 'studio', name: 'Music Studio', tag: 'Studio · Sound Isolated',
    cx: -17, cy: -14, w: 20, d: 16, angle: -5, height: 14, sqft: 320,
    fill: '#1a060f', stroke: '#f43f5e',
    desc: 'Sound-isolated SW volume with thick concrete walls. Clerestory windows only — no exterior views — for full acoustic separation. Inner void body represents the double-wall construction.',
    features: ['14 ft ceiling', 'Clerestory windows only', 'Double-wall acoustic isolation', 'Loft level at 7 ft'],
    z: 4,
  },
  {
    id: 'gaming', name: 'Gaming Room', tag: 'Entertainment',
    cx: 6, cy: -19, w: 18, d: 10, angle: 4, height: 12, sqft: 180,
    fill: '#110a1f', stroke: '#8b5cf6',
    desc: 'Low-slung projecting volume on the south facade. 12 ft ceiling, full south glazing, brick-clad exterior with a slight 4° rotation off the main axis.',
    features: ['12 ft ceiling', 'Full south glass wall', 'Brick exterior', '+4° rotation off main axis'],
    z: 4,
  },
  {
    id: 'prow', name: 'Gehry Prow', tag: 'Feature · Tallest Element',
    cx: 14, cy: -2, w: 16, d: 14, angle: 22, height: 32, sqft: 224,
    fill: '#0a0f20', stroke: '#818cf8',
    desc: 'The lifting prow — at 32 ft, the tallest element of the composition. Metal-clad tower anchoring the east facade, aggressively rotated at +22°. Full-height glazing on all four sides.',
    features: ['32 ft — highest point', 'Metal-clad exterior', 'Full-height glazing', '+22° rotation'],
    z: 5,
  },
  {
    id: 'foyer', name: 'Entry Foyer', tag: 'Entry · South Facade',
    cx: 1, cy: -16, w: 14, d: 10, angle: 6, height: 14, sqft: 140,
    fill: '#1a1406', stroke: '#fbbf24',
    desc: 'Glass vestibule projecting south from the main bar. Tall glass front door on the south face; glass walls on east, south, and west. Rotation matches the main bar at +6°.',
    features: ['Glass front door (south)', '14 ft ceiling', 'Glass walls E, S, W', 'Aligned with main bar (+6°)'],
    z: 5,
  },
];

// ── Geometry helpers ─────────────────────────────────────────────────────────
function corners(cx, cy, w, d, angleDeg) {
  const a = angleDeg * Math.PI / 180;
  const hw = w / 2, hd = d / 2;
  return [[-hw,-hd],[hw,-hd],[hw,hd],[-hw,hd]].map(([x, y]) => [
    cx + x * Math.cos(a) - y * Math.sin(a),
    -(cy + x * Math.sin(a) + y * Math.cos(a))  // flip Y: +Y=North → up on screen
  ]);
}

function ptStr(pts) {
  return pts.map(([x,y]) => `${x.toFixed(2)},${y.toFixed(2)}`).join(' ');
}

function centroid(pts) {
  return [
    pts.reduce((s,[x])=>s+x,0)/pts.length,
    pts.reduce((s,[,y])=>s+y,0)/pts.length
  ];
}

// ── Render rooms ─────────────────────────────────────────────────────────────
const roomsLayer = document.getElementById('rooms-layer');
const labelsLayer = document.getElementById('labels-layer');

const sorted = [...ROOMS].sort((a,b) => a.z - b.z);

sorted.forEach(room => {
  const pts  = corners(room.cx, room.cy, room.w, room.d, room.angle);
  const [lx, ly] = centroid(pts);

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.classList.add('room-group');
  g.dataset.id = room.id;

  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.classList.add('room-poly');
  poly.setAttribute('points', ptStr(pts));
  poly.setAttribute('fill', room.fill);
  poly.setAttribute('stroke', room.stroke);
  poly.setAttribute('stroke-width', '0.4');
  g.appendChild(poly);

  roomsLayer.appendChild(g);

  // Label — skip the largest background shapes
  const skipLabel = ['yard'].includes(room.id);
  if (!skipLabel) {
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', lx.toFixed(2));
    txt.setAttribute('y', ly.toFixed(2));
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('dominant-baseline','middle');
    const fs = room.w > 28 ? '2.4' : room.w > 16 ? '2.0' : '1.7';
    txt.setAttribute('font-size', fs);
    txt.setAttribute('fill', room.stroke);
    txt.setAttribute('font-weight','600');
    txt.setAttribute('pointer-events','none');
    txt.setAttribute('opacity','0.85');
    txt.setAttribute('transform',
      `rotate(${-room.angle},${lx.toFixed(2)},${ly.toFixed(2)})`);
    txt.textContent = room.name;
    labelsLayer.appendChild(txt);
  }

  // Events
  g.addEventListener('mouseenter', e => tipShow(e, room));
  g.addEventListener('mousemove',  e => tipMove(e));
  g.addEventListener('mouseleave', tipHide);
  g.addEventListener('click', () => openPanel(room));
});

// Staggered fade-in on load
roomsLayer.querySelectorAll('.room-group').forEach((g, i) => {
  g.style.opacity = '0';
  g.style.transition = `opacity 0.35s ease ${i * 55}ms`;
  setTimeout(() => { g.style.opacity = '1'; }, 40);
});

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tip = document.getElementById('tip');

function tipShow(e, room) {
  tip.textContent = room.name + (room.height ? `  ·  ${room.height} ft` : '');
  tip.classList.add('show');
  tipMove(e);
}
function tipMove(e) {
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 32) + 'px';
}
function tipHide() { tip.classList.remove('show'); }

// ── Detail panel ──────────────────────────────────────────────────────────────
const panel   = document.getElementById('detail-panel');
const content = document.getElementById('detail-content');
const hint    = document.getElementById('hint');

function openPanel(room) {
  hint.classList.add('gone');

  // Reset all
  roomsLayer.querySelectorAll('.room-group').forEach(g => g.classList.remove('selected'));

  // Highlight selected
  const g = roomsLayer.querySelector(`[data-id="${room.id}"]`);
  if (g) g.classList.add('selected');

  content.innerHTML = `
    <div class="color-bar" style="background:${room.stroke}"></div>
    <div class="detail-tag" style="color:${room.stroke}">${room.tag}</div>
    <div class="detail-name">${room.name}</div>
    <div class="metrics">
      ${room.sqft ? `<div class="metric">
        <div class="metric-val">${room.sqft.toLocaleString()}</div>
        <div class="metric-lbl">sq ft</div>
      </div>` : ''}
      ${room.height ? `<div class="metric">
        <div class="metric-val">${room.height} ft</div>
        <div class="metric-lbl">height</div>
      </div>` : ''}
      <div class="metric">
        <div class="metric-val">${room.w} × ${room.d} ft</div>
        <div class="metric-lbl">footprint</div>
      </div>
      <div class="metric">
        <div class="metric-val">${room.angle > 0 ? '+' : ''}${room.angle}°</div>
        <div class="metric-lbl">rotation</div>
      </div>
    </div>
    <p class="detail-desc">${room.desc}</p>
    <div class="features-title">Features</div>
    <ul class="features">
      ${room.features.map(f=>`<li>${f}</li>`).join('')}
    </ul>
  `;

  panel.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
  roomsLayer.querySelectorAll('.room-group').forEach(g => g.classList.remove('selected'));
}

document.getElementById('detail-close').addEventListener('click', closePanel);
document.getElementById('plan-svg').addEventListener('click', e => {
  if (!e.target.closest('.room-group')) closePanel();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>
</body>
</html>
